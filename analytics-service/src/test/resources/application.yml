spring:
  datasource:
    url: jdbc:h2:mem:analyticsdb;MODE=MySQL;DATABASE_TO_LOWER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  sql:
    init:
      mode: always
      schema-locations: classpath:schema-test.sql
  cloud:
    consul:
      enabled: false
      discovery:
        enabled: false

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

analytics:
  rebuild:
    fixed-rate-ms: 3600000
