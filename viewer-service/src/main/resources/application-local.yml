spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${DB_HOST}/javaee_donation_live?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 50
      minimum-idle: 5
      idle-timeout: 30000
      connection-timeout: 10000
      max-lifetime: 1800000
      initialization-fail-timeout: -1
  cloud:
    consul:
      host: 127.0.0.1
      port: 8500
      discovery:
        prefer-ip-address: true
        instance-id: ${spring.application.name}-${server.port}-${random.value}
        health-check-path: /actuator/health/readiness
        health-check-interval: 10s
        deregister-critical-service-after: 30s
    openfeign:
      client:
        config:
          default:
            connectTimeout: 3000
            readTimeout: 8000
          finance-service:
            connectTimeout: 3000
            readTimeout: 15000
          analytics-service:
            connectTimeout: 3000
            readTimeout: 8000
    sentinel:
      enabled: true
      eager: false

server:
  tomcat:
    threads:
      max: 200
      min-spare: 10
    accept-count: 100
    max-connections: 10000

clients:
  finance-service: http://127.0.0.1:8082
  analytics-service: http://127.0.0.1:8083

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true

viewer:
  reward:
    qps-limit: 800
    settlement:
      thread-pool-size: 256
      queue-capacity: 20000
      retry-delay-seconds: 5
      processing-lease-seconds: 30
      recovery-batch-size: 200
      recovery-fixed-delay-ms: 3000

logging:
  level:
    root: INFO
    com.javaee.donation.viewer: INFO
