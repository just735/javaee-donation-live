spring:
  cloud:
    consul:
      host: 127.0.0.1
      port: 8500
      discovery:
        prefer-ip-address: true
    openfeign:
      circuitbreaker:
        enabled: true
        alphanumeric-ids:
          enabled: true
      client:
        config:
          default:
            connectTimeout: 3000
            readTimeout: 5000
          finance-service:
            connectTimeout: 3000
            readTimeout: 10000
          analytics-service:
            connectTimeout: 2000
            readTimeout: 2000

resilience4j:
  circuitbreaker:
    instances:
      analyticsProfile:
        sliding-window-size: 20
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
      analyticsTopViewers:
        sliding-window-size: 20
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
      financeSettle:
        sliding-window-size: 20
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
  timelimiter:
    instances:
      analyticsProfile:
        timeout-duration: 2s
        cancel-running-future: true
  ratelimiter:
    instances:
      viewerReward:
        limit-for-period: 200
        limit-refresh-period: 1s
        timeout-duration: 0

clients:
  finance-service: http://127.0.0.1:8082
  analytics-service: http://127.0.0.1:8083

logging:
  level:
    root: INFO
    com.javaee.donation.viewer: INFO
